<!DOCTYPE html>
<html lang="en">
<html>

<head>
    <meta charset="UTF-8">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.5.0/p5.js"></script>
    <script src="https://cdn.plot.ly/plotly-3.4.0.min.js" charset="utf-8"></script>

    <style>
        body {
            padding: 0;
            margin: 0;
            background-color: black;
        }
    </style>
</head>

<body>
    <div id="plot" style="width:900px;height:900px;"></div>
    <script>
        let plotdiv = document.getElementById('plot');
        let embedx = []
        let embedy = []
        fetchJSONData()

        function fetchJSONData() {
            fetch('./artworksEmbedding.json')
                .then(response => {
                    if (!response.ok) {
                        throw new Error(`HTTP error! Status: ${response.status}`);
                    }
                    return response.json();
                })
                .then(data => {
                    console.log(data.embedding);
                    plot(data)
                })
                .catch(error => console.error('Failed to fetch data:', error));
        }

        function plot(JSONembedding) {
            let embedding = JSONembedding.embedding
            for (i in embedding) {
                console.log("x: " + embedding[i][0] + "; y: " + embedding[i][1])
                embedx.push(embedding[i][0])
                embedy.push(embedding[i][1])
            }
            let labels = JSONembedding.labels
            var trace1 = {
                x: embedx,
                y: embedy,
                mode: 'markers',
                type: 'scatter',
                name: 'Art',
                text: labels,
                marker: { size: 12 }
            };
            Plotly.newPlot(plotdiv, [trace1]);
        }


    </script>
</body>

</html>
